<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D-гараж — Москвич 2141 & Subaru Outback</title>
    <style>
        /* ---- Сброс и фон ---- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #0a0a1a;
            color: white;
        }

        /* ---- Верхняя панель ---- */
        #header {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center;
            pointer-events: none;
            user-select: none;
            min-width: 200px;
        }
        #header h1 {
            font-size: 1.4rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        #header h1 small {
            font-size: 0.85rem;
            font-weight: 300;
            color: #aaa;
            display: block;
            margin-top: 2px;
        }

        /* ---- Боковая панель управления ---- */
        #panel {
            position: absolute;
            top: 100px;
            right: 20px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 250px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: calc(100vh - 140px);
            overflow-y: auto;
        }
        #panel h3 {
            font-size: 0.9rem;
            font-weight: 400;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 8px;
        }

        /* ---- Кнопки выбора модели ---- */
        .model-selector {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .model-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent;
            color: #fff;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.25s;
            font-weight: 500;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .model-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }
        .model-btn.active {
            background: rgba(255, 107, 53, 0.2);
            border-color: #ff6b35;
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.1);
        }
        .model-btn .badge {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff6b35;
            flex-shrink: 0;
        }
        .model-btn .badge.inactive {
            background: #555;
        }

        /* ---- Координаты ---- */
        #coords {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
            padding: 12px 14px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        #coords .label {
            color: #888;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        #coords .value {
            color: #88ddff;
            margin-top: 4px;
            display: block;
            word-break: break-all;
        }

        /* ---- Кнопки действий ---- */
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .action-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #fff;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 400;
        }
        .action-btn:hover {
            background: rgba(255, 255, 255, 0.12);
        }
        .action-btn.primary {
            background: #ff6b35;
            border-color: #ff6b35;
            font-weight: 500;
        }
        .action-btn.primary:hover {
            background: #ff7a4a;
            transform: scale(1.02);
        }
        .action-btn.success {
            background: #22aa55;
            border-color: #22aa55;
            font-weight: 500;
        }
        .action-btn.success:hover {
            background: #2abb66;
            transform: scale(1.02);
        }
        .action-btn.danger {
            border-color: #ff3355;
            color: #ff3355;
        }
        .action-btn.danger:hover {
            background: rgba(255, 51, 85, 0.15);
        }

        /* ---- Подсказка по управлению ---- */
        #controls-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.8rem;
            color: #aaa;
            border: 1px solid rgba(255, 255, 255, 0.05);
            pointer-events: none;
            user-select: none;
            white-space: nowrap;
        }
        #controls-hint strong {
            color: #fff;
        }

        /* ---- Индикатор загрузки ---- */
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            text-align: center;
            pointer-events: none;
        }
        #loading .spinner {
            width: 50px;
            height: 50px;
            margin: 0 auto 16px;
            border: 4px solid rgba(255, 255, 255, 0.08);
            border-top: 4px solid #ff6b35;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #loading p {
            font-size: 1rem;
            opacity: 0.7;
        }

        /* ---- Адаптивность ---- */
        @media (max-width: 768px) {
            #panel {
                right: 10px;
                top: 80px;
                width: 200px;
                padding: 14px;
                font-size: 0.85rem;
            }
            #header {
                top: 12px;
                padding: 8px 16px;
                min-width: auto;
                width: 90%;
            }
            #header h1 {
                font-size: 1.1rem;
            }
            #controls-hint {
                font-size: 0.65rem;
                padding: 6px 14px;
                bottom: 16px;
                white-space: normal;
                max-width: 90%;
            }
        }
    </style>
</head>
<body>

    <!-- Верхний заголовок -->
    <div id="header">
        <h1>🚗 3D-Гараж <small>Москвич 2141 · Subaru Outback</small></h1>
    </div>

    <!-- Боковая панель -->
    <div id="panel">
        <h3>📦 Модели</h3>
        <div class="model-selector">
            <button class="model-btn active" data-model="moskvich">
                <span class="badge"></span> Москвич 2141
            </button>
            <button class="model-btn" data-model="subaru">
                <span class="badge inactive"></span> Subaru Outback
            </button>
        </div>

        <h3>📍 Координаты</h3>
        <div id="coords">
            <span class="label">X · Y · Z</span>
            <span class="value" id="coordDisplay">0.00 · 0.00 · 0.00</span>
        </div>

        <h3>🎮 Действия</h3>
        <div class="action-buttons">
            <button class="action-btn success" id="btnCenterModel">🎯 В центр (0, 0, 0)</button>
            <button class="action-btn" id="btnResetPos">↺ Сброс позиции</button>
            <button class="action-btn primary" id="btnSavePos">💾 Сохранить позицию</button>
            <button class="action-btn" id="btnFocus">👁 Фокус на модель</button>
            <button class="action-btn danger" id="btnResetCamera">📷 Сброс камеры</button>
        </div>
    </div>

    <!-- Подсказка внизу -->
    <div id="controls-hint">
        <strong>W A S D</strong> — перемещение &nbsp;·&nbsp; <strong>Стрелки</strong> — движение &nbsp;·&nbsp; <strong>Мышь</strong> — вращение камеры
    </div>

    <!-- Индикатор загрузки -->
    <div id="loading">
        <div class="spinner"></div>
        <p id="loadStatus">Загрузка моделей...</p>
    </div>

    <!-- Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --------------------------------------------------------------
        // 1. СЦЕНА, КАМЕРА, РЕНДЕРЕР
        // --------------------------------------------------------------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(6, 4, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // --------------------------------------------------------------
        // 2. УПРАВЛЕНИЕ (OrbitControls)
        // --------------------------------------------------------------
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.autoRotate = false;
        controls.minDistance = 2;
        controls.maxDistance = 20;
        controls.target.set(0, 0.3, 0);
        controls.update();

        // --------------------------------------------------------------
        // 3. ОСВЕЩЕНИЕ
        // --------------------------------------------------------------
        const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffeedd, 2.5);
        dirLight.position.set(6, 10, 6);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.bias = -0.001;
        dirLight.shadow.camera.near = 0.1;
        dirLight.shadow.camera.far = 30;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        scene.add(dirLight);

        const backLight = new THREE.DirectionalLight(0x4488ff, 0.6);
        backLight.position.set(-4, 2, -6);
        scene.add(backLight);

        const fillLight = new THREE.PointLight(0xff6633, 0.4, 15);
        fillLight.position.set(0, -1, 3);
        scene.add(fillLight);

        // --------------------------------------------------------------
        // 4. ПОЛ (большая платформа)
        // --------------------------------------------------------------
        const groundGeo = new THREE.PlaneGeometry(20, 20);
        const groundMat = new THREE.ShadowMaterial({
            opacity: 0.3,
            color: 0x000000,
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.5;
        ground.receiveShadow = true;
        scene.add(ground);

        const gridHelper = new THREE.GridHelper(12, 20, 0x6666aa, 0x333355);
        gridHelper.position.y = -0.49;
        scene.add(gridHelper);

        // Центральный маркер
        const markerGeo = new THREE.RingGeometry(0.4, 0.6, 32);
        const markerMat = new THREE.MeshBasicMaterial({
            color: 0xff6b35,
            side: THREE.DoubleSide,
            transparent: true,
            opacity: 0.3,
        });
        const marker = new THREE.Mesh(markerGeo, markerMat);
        marker.rotation.x = -Math.PI / 2;
        marker.position.y = -0.48;
        scene.add(marker);

        // --------------------------------------------------------------
        // 5. ЗАГРУЗЧИК МОДЕЛЕЙ
        // --------------------------------------------------------------
        const loader = new GLTFLoader();
        const loadingDiv = document.getElementById('loading');
        const loadStatus = document.getElementById('loadStatus');

        const models = {
            moskvich: { object: null, loaded: false },
            subaru: { object: null, loaded: false }
        };

        let activeModel = 'moskvich';

        // Функция загрузки модели с принудительной центровкой
        function loadModel(key, path) {
            loadStatus.textContent = `Загрузка ${key === 'moskvich' ? 'Москвича' : 'Subaru'}...`;

            return new Promise((resolve) => {
                loader.load(
                    path,
                    (gltf) => {
                        const model = gltf.scene;

                        // ---- ПРИНУДИТЕЛЬНАЯ ЦЕНТРОВКА В (0,0,0) ----
                        // 1. Вычисляем bounding box
                        const box = new THREE.Box3().setFromObject(model);
                        const size = box.getSize(new THREE.Vector3());
                        const center = new THREE.Vector3();
                        box.getCenter(center);

                        // 2. Масштабируем до разумного размера
                        const maxDim = Math.max(size.x, size.y, size.z);
                        const targetSize = 2.0;
                        if (maxDim > 0.01) {
                            const scale = targetSize / maxDim;
                            model.scale.set(scale, scale, scale);
                        }

                        // 3. Центрируем модель (переносим так, чтобы центр геометрии был в (0,0,0))
                        // Сначала применяем масштаб к центру
                        const scaledCenter = center.clone().multiply(model.scale);
                        model.position.sub(scaledCenter);
                        
                        // 4. Опускаем на пол (чтобы нижняя точка была на Y=0)
                        // Заново вычисляем bounding box после центровки
                        const newBox = new THREE.Box3().setFromObject(model);
                        const minY = newBox.min.y;
                        model.position.y = -minY; // Поднимаем так, чтобы минимум был на 0

                        console.log(`✅ ${key} центрирована в (0, 0, 0)`);

                        // Тени
                        model.traverse((child) => {
                            if (child.isMesh) {
                                child.castShadow = true;
                                child.receiveShadow = true;
                            }
                        });

                        // Прячем изначально
                        model.visible = (key === activeModel);

                        scene.add(model);

                        models[key].object = model;
                        models[key].loaded = true;

                        resolve(model);
                    },
                    undefined,
                    (error) => {
                        console.error(`Ошибка загрузки ${key}:`, error);
                        loadStatus.textContent = `❌ Ошибка: ${path}`;
                        resolve(null);
                    }
                );
            });
        }

        // Загружаем обе модели
        Promise.all([
            loadModel('moskvich', 'moskvich.glb'),
            loadModel('subaru', 'subaru_outback.glb')
        ]).then(() => {
            loadingDiv.style.display = 'none';
            updateCoordDisplay();
        });

        // --------------------------------------------------------------
        // 6. УПРАВЛЕНИЕ МОДЕЛЯМИ
        // --------------------------------------------------------------
        document.querySelectorAll('.model-btn').forEach((btn) => {
            btn.addEventListener('click', () => {
                const key = btn.dataset.model;
                activeModel = key;

                document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                Object.keys(models).forEach(k => {
                    if (models[k].object) {
                        models[k].object.visible = (k === key);
                    }
                });

                updateCoordDisplay();
            });
        });

        function getActiveModelObject() {
            return models[activeModel]?.object || null;
        }

        function updateCoordDisplay() {
            const obj = getActiveModelObject();
            if (obj) {
                const p = obj.position;
                document.getElementById('coordDisplay').textContent =
                    `${p.x.toFixed(2)} · ${p.y.toFixed(2)} · ${p.z.toFixed(2)}`;
            } else {
                document.getElementById('coordDisplay').textContent = '— · — · —';
            }
        }

        // --------------------------------------------------------------
        // 7. ПЕРЕМЕЩЕНИЕ МОДЕЛИ (WASD + Стрелки)
        // --------------------------------------------------------------
        const moveSpeed = 0.08;
        const keys = {};

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
            }
        });
        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        function moveActiveModel() {
            const obj = getActiveModelObject();
            if (!obj) return;

            let dx = 0,
                dz = 0;

            if (keys['w'] || keys['W'] || keys['ArrowUp']) dz -= moveSpeed;
            if (keys['s'] || keys['S'] || keys['ArrowDown']) dz += moveSpeed;
            if (keys['a'] || keys['A'] || keys['ArrowLeft']) dx -= moveSpeed;
            if (keys['d'] || keys['D'] || keys['ArrowRight']) dx += moveSpeed;

            if (dx !== 0 || dz !== 0) {
                if (dx !== 0 && dz !== 0) {
                    dx *= 0.707;
                    dz *= 0.707;
                }
                obj.position.x += dx;
                obj.position.z += dz;

                obj.position.x = Math.max(-8, Math.min(8, obj.position.x));
                obj.position.z = Math.max(-8, Math.min(8, obj.position.z));

                updateCoordDisplay();
            }
        }

        // --------------------------------------------------------------
        // 8. КНОПКИ ДЕЙСТВИЙ
        // --------------------------------------------------------------
        
        // Новая кнопка: поставить строго в центр (0, 0, 0)
        document.getElementById('btnCenterModel').addEventListener('click', () => {
            const obj = getActiveModelObject();
            if (obj) {
                obj.position.set(0, 0, 0);
                updateCoordDisplay();
                // Маленькая анимация обратной связи
                const btn = document.getElementById('btnCenterModel');
                btn.textContent = '✅ В центре!';
                setTimeout(() => {
                    btn.textContent = '🎯 В центр (0, 0, 0)';
                }, 1500);
            }
        });

        document.getElementById('btnResetPos').addEventListener('click', () => {
            const obj = getActiveModelObject();
            if (obj) {
                obj.position.set(0, 0, 0);
                updateCoordDisplay();
            }
        });

        document.getElementById('btnSavePos').addEventListener('click', () => {
            const obj = getActiveModelObject();
            if (!obj) {
                alert('Модель не загружена!');
                return;
            }
            const p = obj.position;
            const name = activeModel === 'moskvich' ? 'Москвич 2141' : 'Subaru Outback';
            const message =
                `📍 Позиция ${name}:\n` +
                `X: ${p.x.toFixed(3)}\n` +
                `Y: ${p.y.toFixed(3)}\n` +
                `Z: ${p.z.toFixed(3)}\n\n` +
                `(Скопируйте эти координаты)`;

            console.log(`✅ Сохранена позиция ${name}:`, p.x, p.y, p.z);
            alert(message);
        });

        document.getElementById('btnFocus').addEventListener('click', () => {
            const obj = getActiveModelObject();
            if (obj) {
                const p = obj.position;
                controls.target.copy(p);
                controls.update();
            }
        });

        document.getElementById('btnResetCamera').addEventListener('click', () => {
            camera.position.set(6, 4, 8);
            controls.target.set(0, 0.3, 0);
            controls.update();
        });

        // --------------------------------------------------------------
        // 9. АДАПТАЦИЯ ПОД ОКНО
        // --------------------------------------------------------------
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --------------------------------------------------------------
        // 10. АНИМАЦИОННЫЙ ЦИКЛ
        // --------------------------------------------------------------
        function animate() {
            requestAnimationFrame(animate);
            moveActiveModel();
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        console.log('🚗 3D-Гараж запущен!');
        console.log('📖 Управление: WASD/Стрелки — перемещение модели, мышь — камера');
        console.log('🎯 Кнопка "В центр (0, 0, 0)" ставит модель строго в центр');
    </script>
</body>
</html>
