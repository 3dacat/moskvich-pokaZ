<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soobaro Out Black — 3D-симулятор</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #87CEEB;
            color: white;
        }

        #hud {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center;
            pointer-events: none;
            user-select: none;
            min-width: 200px;
        }
        #hud .speed {
            font-size: 2rem;
            font-weight: 700;
            color: #ff6b35;
        }
        #hud .speed small {
            font-size: 1rem;
            font-weight: 400;
            color: #888;
        }
        #hud .coords {
            font-size: 0.8rem;
            color: #88ddff;
            font-family: 'Courier New', monospace;
            margin-top: 4px;
        }
        #hud .model-name {
            font-size: 0.9rem;
            color: #ff6b35;
            font-weight: 500;
            margin-top: 2px;
        }

        #controls-hint {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.8rem;
            color: #aaa;
            border: 1px solid rgba(255, 255, 255, 0.05);
            pointer-events: none;
            user-select: none;
            white-space: nowrap;
        }
        #controls-hint strong {
            color: #fff;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            text-align: center;
            pointer-events: none;
        }
        #loading .spinner {
            width: 50px;
            height: 50px;
            margin: 0 auto 16px;
            border: 4px solid rgba(255, 255, 255, 0.08);
            border-top: 4px solid #ff6b35;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #loading p {
            font-size: 1rem;
            opacity: 0.7;
        }

        #switchBtn {
            position: absolute;
            top: 80px;
            right: 20px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
            pointer-events: auto;
        }
        #switchBtn:hover {
            background: rgba(255, 107, 53, 0.3);
            border-color: #ff6b35;
        }

        @media (max-width: 768px) {
            #hud { padding: 8px 16px; min-width: auto; width: 90%; bottom: 16px; }
            #hud .speed { font-size: 1.5rem; }
            #controls-hint { font-size: 0.6rem; padding: 6px 14px; white-space: normal; max-width: 90%; top: 12px; }
            #switchBtn { top: 70px; right: 10px; padding: 8px 14px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <button id="switchBtn">🚗 Переключить на Hunda Seatie</button>

    <div id="controls-hint">
        <strong>W</strong> — газ &nbsp;·&nbsp; <strong>S</strong> — назад &nbsp;·&nbsp; <strong>A/D</strong> — руль &nbsp;·&nbsp; <strong>Пробел</strong> — ручник
    </div>

    <div id="hud">
        <div class="speed"><span id="speedDisplay">0</span> <small>км/ч</small></div>
        <div class="coords" id="coordDisplay">📍 0.00 · 0.00 · 0.00</div>
        <div class="model-name" id="modelNameDisplay">🚙 Soobaro Out Black</div>
    </div>

    <div id="loading">
        <div class="spinner"></div>
        <p id="loadStatus">Загрузка Soobaro Out Black...</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --------------------------------------------------------------
        // 1. СЦЕНА, КАМЕРА, РЕНДЕРЕР
        // --------------------------------------------------------------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.5;
        document.body.appendChild(renderer.domElement);

        // --------------------------------------------------------------
        // 2. ДНЕВНОЕ ОСВЕЩЕНИЕ
        // --------------------------------------------------------------
        const sunLight = new THREE.DirectionalLight(0xffeedd, 2.5);
        sunLight.position.set(10, 15, 8);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 4096;
        sunLight.shadow.mapSize.height = 4096;
        sunLight.shadow.camera.near = 0.1;
        sunLight.shadow.camera.far = 50;
        sunLight.shadow.camera.left = -20;
        sunLight.shadow.camera.right = 20;
        sunLight.shadow.camera.top = 20;
        sunLight.shadow.camera.bottom = -20;
        scene.add(sunLight);

        const fillLight = new THREE.DirectionalLight(0x88ccff, 0.8);
        fillLight.position.set(-5, 3, -8);
        scene.add(fillLight);

        const ambientLight = new THREE.AmbientLight(0x88bbdd, 0.8);
        scene.add(ambientLight);

        const sunSphere = new THREE.Mesh(
            new THREE.SphereGeometry(0.5, 16, 16),
            new THREE.MeshBasicMaterial({ color: 0xffff88 })
        );
        sunSphere.position.copy(sunLight.position);
        sunSphere.position.multiplyScalar(2);
        scene.add(sunSphere);

        // --------------------------------------------------------------
        // 3. ПОЛ
        // --------------------------------------------------------------
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 512;
        const ctx = canvas.getContext('2d');
        
        ctx.fillStyle = '#4a8c3f';
        ctx.fillRect(0, 0, 512, 512);
        
        for (let i = 0; i < 30000; i++) {
            const x = Math.random() * 512;
            const y = Math.random() * 512;
            const size = 1 + Math.random() * 3;
            const green = 100 + Math.random() * 80;
            ctx.fillStyle = `rgb(50, ${green}, 30)`;
            ctx.fillRect(x, y, size, size);
        }
        
        const texture = new THREE.CanvasTexture(canvas);
        texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
        texture.repeat.set(30, 30);

        const groundGeo = new THREE.PlaneGeometry(100, 100);
        const groundMat = new THREE.MeshStandardMaterial({
            map: texture,
            roughness: 0.8,
            metalness: 0.0,
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.5;
        ground.receiveShadow = true;
        scene.add(ground);

        const gridHelper = new THREE.GridHelper(60, 30, 0x88dd88, 0x44aa44);
        gridHelper.position.y = -0.48;
        scene.add(gridHelper);

        const markerGeo = new THREE.RingGeometry(0.4, 0.6, 32);
        const markerMat = new THREE.MeshBasicMaterial({
            color: 0xff6b35,
            side: THREE.DoubleSide,
            transparent: true,
            opacity: 0.3,
        });
        const marker = new THREE.Mesh(markerGeo, markerMat);
        marker.rotation.x = -Math.PI / 2;
        marker.position.y = -0.47;
        scene.add(marker);

        // --------------------------------------------------------------
        // 4. ЗАГРУЗКА МОДЕЛЕЙ
        // --------------------------------------------------------------
        const loader = new GLTFLoader();
        const loadingDiv = document.getElementById('loading');
        const loadStatus = document.getElementById('loadStatus');

        let currentCar = null;
        let carLoaded = false;

        const carState = {
            position: new THREE.Vector3(0, 0, 0),
            velocity: new THREE.Vector3(0, 0, 0),
            rotation: 0,
        };

        const ENGINE_FORCE = 0.04;
        const REVERSE_FORCE = 0.025;
        const MAX_SPEED = 0.5;
        const TURN_SPEED = 0.03;
        const FRICTION = 0.98;

        const keys = {
            w: false,
            s: false,
            a: false,
            d: false,
            space: false,
        };

        // Названия моделей
        const modelNames = {
            subaru: '🚙 Soobaro Out Black',
            honda: '🚗 Hunda Seatie'
        };

        function loadModel(modelName, path) {
            return new Promise((resolve, reject) => {
                const displayName = modelName === 'subaru' ? 'Soobaro Out Black' : 'Hunda Seatie';
                loadStatus.textContent = `Загрузка ${displayName}...`;

                loader.load(
                    path,
                    (gltf) => {
                        const model = gltf.scene;

                        const box = new THREE.Box3().setFromObject(model);
                        const size = box.getSize(new THREE.Vector3());
                        const maxDim = Math.max(size.x, size.y, size.z);
                        const targetSize = 2.0;
                        if (maxDim > 0.01) {
                            const s = targetSize / maxDim;
                            model.scale.set(s, s, s);
                        }

                        const center = new THREE.Vector3();
                        box.getCenter(center);
                        model.position.sub(center);
                        
                        model.position.x = 0;
                        model.position.y = 0;
                        model.position.z = 0;

                        model.traverse((child) => {
                            if (child.isMesh) {
                                child.castShadow = true;
                                child.receiveShadow = true;
                                if (child.material) {
                                    child.material.roughness = 0.3;
                                    child.material.metalness = 0.5;
                                }
                            }
                        });

                        scene.add(model);
                        resolve(model);
                    },
                    (xhr) => {
                        const percent = Math.round((xhr.loaded / xhr.total) * 100);
                        loadStatus.textContent = `Загрузка... ${percent}%`;
                    },
                    (error) => {
                        console.error('Ошибка загрузки:', error);
                        reject(error);
                    }
                );
            });
        }

        let subaruModel = null;
        let hondaModel = null;
        let currentModelName = 'subaru';

        async function init() {
            try {
                subaruModel = await loadModel('subaru', 'subaru_outback.glb');
                currentCar = subaruModel;
                carLoaded = true;
                loadingDiv.style.display = 'none';
                document.getElementById('modelNameDisplay').textContent = modelNames.subaru;
                console.log('✅ Soobaro Out Black загружен в центре (0, 0, 0)');
                
                try {
                    hondaModel = await loadModel('honda', 'honda_city_2017.glb');
                    hondaModel.visible = false;
                    console.log('✅ Hunda Seatie загружена в фоне');
                } catch (e) {
                    console.warn('Hunda Seatie не загружена:', e);
                }
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                loadingDiv.innerHTML = `
                    <p style="color: #ff6b35; font-weight: 500;">
                        ❌ Не удалось загрузить модель.<br>
                        Проверьте путь к файлу <code>subaru_outback.glb</code>.
                    </p>
                `;
            }
        }

        init();

        // --------------------------------------------------------------
        // 5. ПЕРЕКЛЮЧЕНИЕ МОДЕЛЕЙ
        // --------------------------------------------------------------
        const switchBtn = document.getElementById('switchBtn');
        let isSubaru = true;

        switchBtn.addEventListener('click', () => {
            if (!subaruModel || !hondaModel) return;

            if (isSubaru) {
                subaruModel.visible = false;
                hondaModel.visible = true;
                currentCar = hondaModel;
                currentModelName = 'honda';
                switchBtn.textContent = '🚙 Переключить на Soobaro Out Black';
                document.querySelector('#controls-hint').innerHTML = 
                    '<strong>W</strong> — газ &nbsp;·&nbsp; <strong>S</strong> — назад &nbsp;·&nbsp; <strong>A/D</strong> — руль &nbsp;·&nbsp; <strong>Пробел</strong> — ручник &nbsp;·&nbsp; 🚗 Hunda Seatie';
                document.getElementById('modelNameDisplay').textContent = modelNames.honda;
            } else {
                subaruModel.visible = true;
                hondaModel.visible = false;
                currentCar = subaruModel;
                currentModelName = 'subaru';
                switchBtn.textContent = '🚗 Переключить на Hunda Seatie';
                document.querySelector('#controls-hint').innerHTML = 
                    '<strong>W</strong> — газ &nbsp;·&nbsp; <strong>S</strong> — назад &nbsp;·&nbsp; <strong>A/D</strong> — руль &nbsp;·&nbsp; <strong>Пробел</strong> — ручник &nbsp;·&nbsp; 🚙 Soobaro Out Black';
                document.getElementById('modelNameDisplay').textContent = modelNames.subaru;
            }
            
            isSubaru = !isSubaru;
            
            carState.position.set(0, 0, 0);
            carState.velocity.set(0, 0, 0);
            carState.rotation = 0;
            if (currentCar) {
                currentCar.position.set(0, 0, 0);
                currentCar.rotation.y = 0;
            }
        });

        // --------------------------------------------------------------
        // 6. УПРАВЛЕНИЕ
        // --------------------------------------------------------------
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w' || key === 's' || key === 'a' || key === 'd') {
                keys[key] = true;
                e.preventDefault();
            }
            if (e.key === ' ') {
                keys.space = true;
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w' || key === 's' || key === 'a' || key === 'd') {
                keys[key] = false;
                e.preventDefault();
            }
            if (e.key === ' ') {
                keys.space = false;
                e.preventDefault();
            }
        });

        function updateCar() {
            if (!currentCar || !carLoaded) return;

            const { position, velocity, rotation } = carState;

            let acceleration = 0;
            let turn = 0;

            if (keys.w) {
                acceleration = ENGINE_FORCE;
            }
            
            if (keys.s) {
                acceleration = -REVERSE_FORCE;
            }

            if (keys.a) turn = TURN_SPEED;
            if (keys.d) turn = -TURN_SPEED;

            if (Math.abs(velocity.length()) > 0.005) {
                carState.rotation += turn;
            }

            const forward = new THREE.Vector3(-Math.sin(rotation), 0, -Math.cos(rotation));
            velocity.add(forward.clone().multiplyScalar(acceleration));

            const currentSpeed = velocity.length();
            if (currentSpeed > MAX_SPEED) {
                velocity.multiplyScalar(MAX_SPEED / currentSpeed);
            }

            velocity.multiplyScalar(FRICTION);

            if (velocity.length() < 0.001) {
                velocity.set(0, 0, 0);
            }

            position.add(velocity);

            const BOUNDARY = 45;
            if (Math.abs(position.x) > BOUNDARY) {
                position.x = Math.sign(position.x) * BOUNDARY;
                velocity.x = 0;
            }
            if (Math.abs(position.z) > BOUNDARY) {
                position.z = Math.sign(position.z) * BOUNDARY;
                velocity.z = 0;
            }

            currentCar.position.copy(position);
            currentCar.rotation.y = rotation;

            if (Math.abs(turn) > 0.001 && velocity.length() > 0.05) {
                const tilt = -turn * velocity.length() * 0.5;
                currentCar.rotation.z = tilt;
            } else {
                currentCar.rotation.z *= 0.9;
            }

            currentCar.position.y = 0 + Math.sin(Date.now() / 500) * 0.002;

            const speedKmh = Math.round(velocity.length() * 150);
            document.getElementById('speedDisplay').textContent = speedKmh;

            document.getElementById('coordDisplay').textContent =
                `📍 ${position.x.toFixed(2)} · ${position.y.toFixed(2)} · ${position.z.toFixed(2)}`;
        }

        // --------------------------------------------------------------
        // 7. КАМЕРА ОТ ТРЕТЬЕГО ЛИЦА (постоянный ракурс)
        // --------------------------------------------------------------
        // Камера всегда сзади-сверху относительно машины
        const CAMERA_DISTANCE = 5;
        const CAMERA_HEIGHT = 3;
        const CAMERA_SMOOTH = 0.1;

        let cameraTarget = new THREE.Vector3(0, 0.5, 0);

        function updateCamera() {
            if (!currentCar || !carLoaded) return;

            const carPos = currentCar.position.clone();
            
            // Позиция камеры относительно машины (сзади-сверху)
            const angle = carState.rotation;
            const offset = new THREE.Vector3(
                -Math.sin(angle) * CAMERA_DISTANCE,
                CAMERA_HEIGHT,
                -Math.cos(angle) * CAMERA_DISTANCE
            );
            
            const desiredPos = carPos.clone().add(offset);
            
            // Плавное следование
            camera.position.lerp(desiredPos, CAMERA_SMOOTH);

            // Смотрим на машину
            const lookTarget = carPos.clone();
            lookTarget.y += 0.5;
            cameraTarget.lerp(lookTarget, CAMERA_SMOOTH);
            camera.lookAt(cameraTarget);
        }

        // --------------------------------------------------------------
        // 8. АДАПТАЦИЯ ПОД ОКНО
        // --------------------------------------------------------------
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --------------------------------------------------------------
        // 9. АНИМАЦИОННЫЙ ЦИКЛ
        // --------------------------------------------------------------
        function animate() {
            requestAnimationFrame(animate);

            updateCar();
            updateCamera();

            renderer.render(scene, camera);
        }
        animate();

        console.log('🚙 Soobaro Out Black — симулятор запущен!');
        console.log('📍 Спавн в центре (0, 0, 0)');
        console.log('📖 Управление: W-вперёд, S-назад, A/D-руль, Пробел-ручник');
        console.log('🔄 Кнопка справа переключает на Hunda Seatie');
    </script>
</body>
</html>
