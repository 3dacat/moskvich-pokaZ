<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Показ машин — Москвич 2141 и Subaru Outback</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a1a;
            color: #fff;
        }

        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            padding: 16px 24px;
            border-radius: 14px;
            border-left: 4px solid #ff6b35;
            pointer-events: none;
            user-select: none;
        }
        #info h1 {
            font-size: 1.4rem;
            font-weight: 500;
        }
        #info h1 small {
            display: block;
            font-size: 0.85rem;
            font-weight: 300;
            color: #aaa;
            margin-top: 4px;
        }

        #legend {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 30px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            padding: 12px 28px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }
        .legend-color.moskotch {
            background: #ff6b35;
        }
        .legend-color.subaru {
            background: #35b5ff;
        }
        .legend-text {
            font-size: 0.85rem;
            font-weight: 500;
        }
        .legend-text small {
            font-weight: 300;
            opacity: 0.6;
            margin-left: 4px;
        }

        #coords {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            text-align: center;
            pointer-events: none;
            user-select: none;
            min-width: 300px;
        }
        #coords .pos-moskotch {
            color: #ff6b35;
        }
        #coords .pos-subaru {
            color: #35b5ff;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            text-align: center;
            pointer-events: none;
        }
        #loading .spinner {
            width: 50px;
            height: 50px;
            margin: 0 auto 20px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #ff6b35;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #loading p {
            font-size: 1.1rem;
            opacity: 0.7;
        }

        @media (max-width: 700px) {
            #info { top: 12px; left: 12px; padding: 12px 16px; }
            #info h1 { font-size: 1.1rem; }
            #legend { bottom: 20px; padding: 8px 16px; gap: 16px; flex-wrap: wrap; justify-content: center; }
            #legend .legend-text { font-size: 0.75rem; }
            #coords { bottom: 80px; font-size: 0.75rem; min-width: unset; width: 90%; padding: 8px 12px; }
        }
    </style>
</head>
<body>

    <div id="info">
        <h1>🚗 Показ машин <small>Москвич 2141 и Subaru Outback на стартовой позиции</small></h1>
    </div>

    <div id="legend">
        <div class="legend-item">
            <div class="legend-color moskotch"></div>
            <div class="legend-text">Moskotch 21 41 <small>(-58.93, -0.08, -50.91)</small></div>
        </div>
        <div class="legend-item">
            <div class="legend-color subaru"></div>
            <div class="legend-text">Siburoo Outblack <small>(0, 0, 0)</small></div>
        </div>
    </div>

    <div id="coords">
        <div class="pos-moskotch">🚗 Москвич: (-58.93, -0.08, -50.91)</div>
        <div class="pos-subaru">🚙 Subaru: (0.00, 0.00, 0.00)</div>
    </div>

    <div id="loading">
        <div class="spinner"></div>
        <p>Загрузка моделей...</p>
    </div>

    <!-- Подключаем A-Frame -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <!-- Компонент для отображения координат -->
    <script>
        AFRAME.registerComponent('show-coords', {
            init: function() {
                const el = this.el;
                const id = el.id;
                const coordsDiv = document.getElementById('coords');

                this.updateCoords = function() {
                    const pos = el.getAttribute('position');
                    const label = id === 'moskotch' ? 'pos-moskotch' : 'pos-subaru';
                    const name = id === 'moskotch' ? 'Москвич' : 'Subaru';
                    const emoji = id === 'moskotch' ? '🚗' : '🚙';
                    const color = id === 'moskotch' ? '#ff6b35' : '#35b5ff';

                    // Обновляем текст
                    const span = coordsDiv.querySelector(`.${label}`);
                    if (span) {
                        span.textContent = `${emoji} ${name}: (${pos.x.toFixed(2)}, ${pos.y.toFixed(2)}, ${pos.z.toFixed(2)})`;
                        span.style.color = color;
                    }
                };

                // Обновляем каждый кадр
                this.tick = this.updateCoords;
            }
        });
    </script>

    <!-- Сцена A-Frame -->
    <a-scene 
        background="color: #1a1a2e" 
        renderer="colorManagement: true"
        fog="type: linear; color: #1a1a2e; far: 300"
    >

        <!-- Освещение -->
        <a-light type="ambient" color="#404060" intensity="0.5"></a-light>
        <a-light type="directional" color="#ffeedd" intensity="1.5" position="20 30 10" shadow="true"></a-light>
        <a-light type="directional" color="#4488ff" intensity="0.4" position="-10 5 -20"></a-light>

        <!-- Земля -->
        <a-plane 
            rotation="-90 0 0" 
            position="0 -0.5 0" 
            width="200" 
            height="200" 
            color="#2a2a4a" 
            receive-shadow="true"
        ></a-plane>

        <!-- Сетка -->
        <a-entity grid="color: #6688ff; size: 200; divisions: 40" position="0 -0.49 0"></a-entity>

        <!-- Стартовый круг в центре -->
        <a-ring 
            radius-inner="1.5" 
            radius-outer="2.5" 
            color="#35b5ff" 
            opacity="0.3" 
            rotation="-90 0 0" 
            position="0 -0.48 0"
        ></a-ring>

        <!-- Метка "СТАРТ" в центре -->
        <a-text 
            value="СТАРТ Subaru" 
            color="#35b5ff" 
            position="0 0.5 -3" 
            scale="1 1 1"
            align="center"
            opacity="0.5"
        ></a-text>

        <!-- Круг для Москвича -->
        <a-ring 
            radius-inner="1.5" 
            radius-outer="2.5" 
            color="#ff6b35" 
            opacity="0.3" 
            rotation="-90 0 0" 
            position="-58.93 -0.48 -50.91"
        ></a-ring>

        <!-- Метка "МОСКВИЧ" -->
        <a-text 
            value="СТАРТ Москвича" 
            color="#ff6b35" 
            position="-58.93 0.5 -53.91" 
            scale="1 1 1"
            align="center"
            opacity="0.5"
        ></a-text>

        <!-- Оси координат для наглядности -->
        <!-- Ось X (красная) -->
        <a-entity 
            line="start: -60 0 -50; end: 60 0 -50; color: #ff3333; opacity: 0.3"
        ></a-entity>
        <!-- Ось Z (синяя) -->
        <a-entity 
            line="start: -58 0 -60; end: -58 0 60; color: #3333ff; opacity: 0.3"
        ></a-entity>

        <!-- ===== МОСКВИЧ 2141 ===== -->
        <a-entity 
            id="moskotch"
            gltf-model="url(moskvich.glb)"
            position="-58.93 -0.08 -50.91"
            rotation="0 14.32 0"
            scale="1.2 1.2 1.2"
            shadow
            show-coords
        >
            <!-- Подпись над машиной -->
            <a-text 
                value="🚗 Москвич 2141" 
                color="#ff6b35" 
                position="0 1.5 0" 
                scale="0.8 0.8 0.8"
                align="center"
                background="true"
                background-color="rgba(0,0,0,0.6)"
                background-padding="0.2"
                border="true"
                border-color="#ff6b35"
                border-width="0.02"
            ></a-text>
        </a-entity>

        <!-- ===== SUBARU OUTBACK ===== -->
        <a-entity 
            id="subaru"
            gltf-model="url(subaru_outback.glb)"
            position="0 0 0"
            rotation="0 0 0"
            scale="0.9 0.9 0.9"
            shadow
            show-coords
        >
            <!-- Подпись над машиной -->
            <a-text 
                value="🚙 Subaru Outback" 
                color="#35b5ff" 
                position="0 1.5 0" 
                scale="0.8 0.8 0.8"
                align="center"
                background="true"
                background-color="rgba(0,0,0,0.6)"
                background-padding="0.2"
                border="true"
                border-color="#35b5ff"
                border-width="0.02"
            ></a-text>
        </a-entity>

        <!-- Камера, показывающая обе машины -->
        <a-entity 
            id="camera"
            camera="fov: 50"
            position="-25 25 -35"
            look-at="-20 -0.08 -25"
        ></a-entity>

        <!-- Управление камерой (OrbitControls) -->
        <a-entity 
            orbit-controls="
                target: -20 -0.08 -25; 
                minDistance: 5; 
                maxDistance: 150;
                enableDamping: true;
                dampingFactor: 0.05;
            "
        ></a-entity>

    </a-scene>

    <!-- Скрываем загрузку -->
    <script>
        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
        }, 3000);

        console.log('🖥️ Программа-показ запущена!');
        console.log('📍 Москвич: (-58.93, -0.08, -50.91)');
        console.log('📍 Subaru: (0, 0, 0)');
        console.log('🖱️ Управление камерой: мышь — вращение, скролл — приближение');
    </script>
</body>
</html>
